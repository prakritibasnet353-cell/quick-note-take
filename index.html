<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8">
  <title>Quick Note Taker</title>
  <style>
    body {
      font-family: system-ui, sans-serif;
      padding: 20px;
      background: #f4f4f4;
    }

    h1 {
      color: #316357;
    }

    textarea {
      width: 95%;
      height: 60vh;
      font-size: 18px;
      padding: 15px;
      border: 1px solid #ccc;
      border-radius: 6px;
      resize: none;
    }

    button {
      padding: 12px 30px;
      font-size: 18px;
      background: #316357;
      color: white;
      border: none;
      border-radius: 6px;
      cursor: pointer;
      margin-top: 15px;
    }

    button:hover {
      background: #274d44;
    }
  </style>
</head>
<body>

  <h1>Quick Note Taker</h1>

  <textarea id="note" placeholder="Start typing your note..."></textarea>
  <br>
  <button id="save">Save Note</button>

  <script src="renderer.js"></script>
</body>
</html>
